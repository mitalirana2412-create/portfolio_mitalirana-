<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitali Rana ✡ Graphic Designer</title>
<style>
/* ============================================
   MITALI RANA — PORTFOLIO
   Design tokens: quirky editorial / zine-collage
   ============================================ */

@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800;900&family=Caveat:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

:root{
  /* palette — Artcoast trend palette, locked to brief */
  --cream:       #F6EFE2;
  --paper:       #FBF6EC;
  --ink:         #241C14;
  --pink:        #DBA0B2;
  --pink-deep:   #C5798F;
  --green:       #8BA347;
  --green-deep:  #6C8236;
  --orange:      #E66946;
  --mint:        #C5DBD5;
  --mint-deep:   #A9C9C1;

  --font-display: 'Unbounded', sans-serif;
  --font-script:  'Caveat', cursive;
  --font-body:    'Space Grotesk', sans-serif;

  --radius: 6px;
  --border: 2.5px solid var(--ink);
  --shadow-hard: 6px 6px 0 var(--ink);
  --shadow-soft: 8px 10px 24px rgba(36,28,20,0.12);
}

*, *::before, *::after{ box-sizing: border-box; }

html{ scroll-behavior: smooth; }

body{
  margin:0;
  background: var(--cream);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 17px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

img{ max-width:100%; display:block; }
a{ color: inherit; text-decoration: none; }
ul{ list-style:none; margin:0; padding:0; }
h1,h2,h3,h4{ font-family: var(--font-display); margin:0; line-height:1.05; }
p{ margin:0; }

/* subtle grain / paper texture overlay */
body::before{
  content:"";
  position: fixed;
  inset:0;
  pointer-events:none;
  z-index: 500;
  opacity: 0.05;
  background-image: radial-gradient(circle, var(--ink) 1px, transparent 1px);
  background-size: 3px 3px;
  mix-blend-mode: multiply;
}

:focus-visible{
  outline: 3px dashed var(--orange);
  outline-offset: 3px;
}

.wrap{
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 28px;
}

/* ============================================
   MASTHEAD / NAV — styled like a zine cover
   ============================================ */
.masthead{
  position: sticky;
  top:0;
  z-index: 100;
  background: var(--cream);
  border-bottom: var(--border);
}
.masthead-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding: 16px 28px;
  max-width: 1180px;
  margin: 0 auto;
}
.brandmark{
  display:flex;
  align-items:center;
  gap:10px;
  font-family: var(--font-display);
  font-weight:800;
  font-size: 1.15rem;
  letter-spacing: 0.01em;
  cursor:pointer;
}
.brandmark .stamp{
  width: 40px; height:40px;
  border-radius:50%;
  border: 2px solid var(--ink);
  display:flex; align-items:center; justify-content:center;
  transform: rotate(-8deg);
  background: var(--pink);
  font-family: var(--font-script);
  font-size: 1.3rem;
  flex-shrink:0;
}
.issue-tag{
  font-family: var(--font-body);
  font-size: 0.68rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink);
  opacity:0.6;
  display:block;
  font-weight:600;
}
.navlinks{
  display:flex;
  gap: 6px;
  align-items:center;
}
.navlinks a{
  font-family: var(--font-body);
  font-weight:600;
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 8px 14px;
  border-radius: 999px;
  border: 2px solid transparent;
  transition: all .18s ease;
  white-space:nowrap;
  cursor:pointer;
}
.navlinks a:hover{
  border-color: var(--ink);
  background: var(--mint);
}
.navlinks a.active{
  border-color: var(--ink);
  background: var(--orange);
  color: var(--paper);
}
.nav-toggle{
  display:none;
  background:none; border: 2px solid var(--ink); border-radius: 8px;
  width:42px; height:42px;
  font-family: var(--font-display);
  cursor:pointer;
}

@media (max-width: 760px){
  .nav-toggle{ display:block; }
  .navlinks{
    position:absolute;
    top: 100%;
    left:0; right:0;
    background: var(--cream);
    flex-direction:column;
    align-items:stretch;
    border-bottom: var(--border);
    padding: 10px 20px 18px;
    display:none;
  }
  .navlinks.open{ display:flex; }
  .navlinks a{ text-align:center; }
}

/* ============================================
   FOOTER
   ============================================ */
footer{
  background: var(--ink);
  color: var(--paper);
  padding: 56px 0 30px;
  margin-top: 0;
}

/* ============================================
   SECTION
   ============================================ */
.section{ padding: 84px 0; position:relative; }
.bg-cream{ background: var(--cream); }
.bg-pink{ background: var(--pink); }
.bg-mint{ background: var(--mint); }

@media (max-width: 640px){
  .section{ padding: 56px 0; }
  body{ font-size: 16px; }
}

/* ============================================
   WORK PAGE — GRIDS & ITEMS
   ============================================ */
.client-grid{
  display:grid;
  gap: 20px;
}
.grid-6{ grid-template-columns: repeat(3, 1fr); }

.ci{
  border: 2.5px solid var(--ink);
  box-shadow: 6px 6px 0 var(--ink);
  overflow:hidden;
  transform: rotate(var(--r,0deg));
  transition: transform .2s ease, box-shadow .2s ease;
  background: var(--paper);
}
.ci:hover{ transform: rotate(0deg) translateY(-4px); box-shadow: 8px 10px 0 var(--ink); }
.ci img{ width:100%; height:100%; object-fit:cover; display:block; aspect-ratio: 4/5; }

@media (max-width: 900px){
  .grid-6{ grid-template-columns: repeat(2,1fr); }
}
@media (max-width: 560px){
  .grid-6{ grid-template-columns: 1fr 1fr; }
}

/* ============================================
   VIDEO GRID
   ============================================ */
.video-grid{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  margin-top: 30px;
}
.video-item{
  background: var(--paper);
  padding: 8px;
  border: 2.5px solid var(--ink);
  border-radius: 10px;
  box-shadow: 6px 6px 0 var(--ink);
  transition: transform .2s ease;
  overflow: hidden;
}
.video-item:hover{
  transform: translateY(-4px);
}
.video-item video{
  width: 100%;
  height: auto;
  display: block;
  border-radius: 6px;
}

@media (max-width: 900px){
  .video-grid{ grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 560px){
  .video-grid{ grid-template-columns: 1fr; }
}

</style>
</head>
